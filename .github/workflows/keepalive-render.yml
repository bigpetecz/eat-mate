name: Keep Render API Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        env:
          KEEP_ALIVE_API_URL: ${{ secrets.KEEP_ALIVE_API_URL }}
        run: |
          if [ -z "$KEEP_ALIVE_API_URL" ]; then
            echo "KEEP_ALIVE_API_URL secret is not set"
            exit 1
          fi

          base_url="${KEEP_ALIVE_API_URL%/}"
          first_try="$KEEP_ALIVE_API_URL"
          health_try="$base_url/health"
          api_health_try="$base_url/api/health"

          # Try the configured URL first, then common Nest/Render health paths.
          # Some deployments return 404 on one path but are still healthy.
          for url in "$first_try" "$health_try" "$api_health_try"; do
            echo "Pinging $url"
            if curl --fail --silent --show-error --max-time 20 "$url" >/dev/null; then
              echo "Keep-alive ping succeeded: $url"
              exit 0
            fi
          done

          echo "Keep-alive ping failed for all URL variants"
          exit 1
