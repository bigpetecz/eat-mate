name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

jobs:
  release:
    name: Tag and Release
    # Only run when CI passes — never release broken code
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required for changelog generation
          fetch-depth: 0

      - name: Bump version tag from Conventional Commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # feat: → minor bump, fix:/chore:/etc → patch, BREAKING CHANGE → major
          default_bump: patch
          tag_prefix: v
          release_branches: main,master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
