name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  frontend-quality:
    name: Frontend Lint Typecheck Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend quality checks
        run: npm run ci:frontend
